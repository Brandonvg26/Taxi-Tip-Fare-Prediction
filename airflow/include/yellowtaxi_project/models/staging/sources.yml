version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: raw_sales
        description: 'Raw NYC TLC Yellow Taxi trip records Sep-Nov 2025'
        columns:
          - name: fare_amount
            data_tests: [not_null]
          - name: payment_type
            data_tests:
              - accepted_values:
                  arguments:
                    values: [1, 2, 3, 4, 5, 6]
                  config:
                    severity: warn
          - name: tpep_pickup_datetime
            data_tests: [not_null]